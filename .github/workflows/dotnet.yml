name: .NET

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore HolidayCalendar.sln

      - name: Build solution
        run: dotnet build HolidayCalendar.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test HolidayCalendar.sln --configuration Release --no-build

      - name: Pack library
        run: dotnet pack HolidayCalendar.Core/HolidayCalendar.Core.csproj --configuration Release --no-build
